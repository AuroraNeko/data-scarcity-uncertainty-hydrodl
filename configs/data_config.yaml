# =============================================================================
# Data configuration reference for LPU-Stream (CAMELS-US preprocessing).
#
# NOTE: this file documents the canonical preprocessing settings. The
# preprocessing scripts in src/data currently hard-code the same values so they
# can run standalone; nothing loads this YAML at runtime. Keep it in sync with
# src/data/data_preprocessing.py and src/data/dataset.py when changing settings.
# =============================================================================

dataset:
  name: camels_us
  raw_dir: data/raw/camels_us
  processed_dir: data/processed/camels_us
  forcing_sources:
    - daymet
    - maurer
    - nldas

# Temporal splits (water-year aligned; match data_preprocessing.TRAIN/VAL/TEST_*).
date_splits:
  train_start: "1980-10-01"
  train_end: "1995-09-30"      # 15-year training; truncated for scarcity runs
  val_start: "1995-10-01"
  val_end: "2000-09-30"        # also used as the CQR calibration period
  test_start: "2000-10-01"
  test_end: "2010-09-30"

# Five base variables from each of the three forcing products.
base_dynamic_variables:
  - prcp
  - srad
  - tmax
  - tmin
  - vp

# Final dynamic feature order used by src/data/data_preprocessing.py and
# src/data/dataset.py. This gives 15 dynamic inputs in total.
dynamic_variables:
  - prcp_daymet
  - srad_daymet
  - tmax_daymet
  - tmin_daymet
  - vp_daymet
  - prcp_maurer
  - srad_maurer
  - tmax_maurer
  - tmin_maurer
  - vp_maurer
  - prcp_nldas
  - srad_nldas
  - tmax_nldas
  - tmin_nldas
  - vp_nldas

# 13 static catchment attributes (match STATIC_ATTR_FILES / dataset.STATIC_COLS).
static_attributes:
  topo:
    - elev_mean
    - slope_mean
    - area_gages2
  clim:
    - p_mean
    - pet_mean
    - aridity
    - frac_snow
    - p_seasonality
  soil:
    - soil_depth_pelletier
    - soil_porosity
  vege:
    - frac_forest
    - lai_diff
  geol:
    - geol_porostiy   # spelling as in the original CAMELS dataset

target:
  variable: streamflow_mm
  transform: log1p   # log1p == ln(1 + y) via numpy.log1p
  missing_marker: -999.0

missing_values:
  dynamic_method: linear_interpolation
  dynamic_max_gap: 7
  static_method: median_fill
  streamflow: mask_only   # missing streamflow is masked, not filled

normalization:
  method: standard        # z-score
  compute_from: train_period
